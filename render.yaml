services:
  - type: web
    name: emon-md
    runtime: docker
    dockerfilePath: lib/Dockerfile
    envVars:
      - key: SESSION_ID
        value: ""
      - key: OWNER_NUMBER
        value: "8801309991724"
      - key: BOT_NAME
        value: "EMON-MD"
      - key: COMMAND_MODE
        value: "public"
      - key: TIMEZONE
        value: "Asia/Dhaka"
      - key: MONGO_URL
        value: ""
      - key: POSTGRES_URL
        value: ""
      - key: MYSQL_URL
        value: ""
      - key: DB_URL
        value: ""
    startCommand: npm run start:optimized
